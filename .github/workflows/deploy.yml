name: Deploy portfolio-site to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'portfolio-site/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'portfolio-site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  quality:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio-site/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    name: Vercel prebuilt build
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio-site/package-lock.json
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel env
        run: |
          vercel pull --yes \
            --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: |
          vercel build ${{ github.event_name == 'push' && '--prod' || '' }} \
            --standalone \
            --token=${{ secrets.VERCEL_TOKEN }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-build
          path: portfolio-site/.vercel/output
          retention-days: 1
          include-hidden-files: true

  deploy:
    name: Deploy prebuilt to Vercel
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-site
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vercel-build
          path: portfolio-site/.vercel/output
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy prebuilt
        run: |
          vercel deploy --prebuilt \
            ${{ github.event_name == 'push' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
